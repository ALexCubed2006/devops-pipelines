name: ci-pipeline

on:
  push:
    branches: [ main ]

jobs:
  build:
		on:
		runs-on: ubuntu-latest
 
	steps:
 	- name: checkout
		uses: actions/checkout@v5

	- name: setup
	  uses: actions/setup-node@v3
	  with:
	  	node-version: 16

	- name: install
	  run: npm install

	- name: tests
	  run: npm test
		
