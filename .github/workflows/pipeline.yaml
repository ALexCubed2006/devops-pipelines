name: ci-pipeline

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
 
    steps:
      - name: checkout
        uses: actions/checkout@v5

      - name: setup-node
        uses: actions/setup-node@v4
        with: 
          node-version: 16

      - name: install
        run: npm install
  
      - name: tests
        run: npm test
